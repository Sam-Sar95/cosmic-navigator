<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0e27" />
    <meta name="description" content="Cosmic Navigator - Calcola il tuo tema natale astrale con intelligenza cosmica" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/assets/images/icon.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
    
    <!-- Status Bar Color for Mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cosmic Navigator" />
    
    <title>Cosmic Navigator</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body, #root {
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      body {
        background-color: #0a0e27;
        color: #ecedee;
      }
      
      #root {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      .logo {
        width: 120px;
        height: 120px;
        background: url('/assets/images/icon.png') center/contain no-repeat;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(236, 237, 238, 0.2);
        border-top: 3px solid #7c3aed;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .text {
        font-size: 1.2rem;
        text-align: center;
        color: #9ba1a6;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <div class="logo"></div>
        <div class="spinner"></div>
        <div class="text">Caricamento di Cosmic Navigator...</div>
      </div>
    </div>

    <script>
      // PWA Service Worker Registration
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/public/service-worker.js').catch(err => {
          console.log('Service Worker registration failed:', err);
        });
      }

      // Placeholder: In futuro, il vero app React Native/Expo sarà caricato qui
      // Per ora mostriamo una pagina di caricamento che indica che l'app è in preparazione
      console.log('Cosmic Navigator PWA - Loading...');
    </script>
  </body>
</html>
